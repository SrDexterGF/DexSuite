<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>DexSuite — Preview</title>
<style>
:root{
  --bgWindow:#1B1B1B;--bgSidebar:#202020;--bgCard:#2C2C2C;--bgCardHover:#383838;--bgSubtle:#404040;
  --stroke:#3F3F3F;--strokeSub:#2E2E2E;
  --text:#FFFFFF;--text2:#C8C8C8;--text3:#7E7E7E;--onAccent:#FFFFFF;
  --accent:#60CDFF;--accent2:#7DD8FF;--accent3:#4A9FCC;
  --success:#00D9A0;--successBg:#3300D9A0;
  --caution:#FFB800;--cautionBg:#33FFB800;
  --critical:#FF5470;--criticalBg:#33FF5470;
  --previewC1:#1B1B1B;--previewC2:#60CDFF;--previewC3:#FFFFFF;
}
[data-theme="cybernetic"]{
  --bgWindow:#0A0A1A;--bgSidebar:#0F0F1F;--bgCard:#14142A;--bgCardHover:#1A1A38;--bgSubtle:#1F1F3D;
  --stroke:#2A2A4A;--strokeSub:#1F1F3D;
  --text:#E8F4F8;--text2:#8C97A8;--text3:#6B7280;--onAccent:#050511;
  --accent:#00B8D9;--accent2:#00E5FF;--accent3:#007A99;
  --accentExtra:#9D4EDD;
  --previewC1:#0F0F1F;--previewC2:#00B8D9;--previewC3:#9D4EDD;
}
[data-theme="redline"]{
  --bgWindow:#0A0606;--bgSidebar:#130808;--bgCard:#1A0E0E;--bgCardHover:#231414;--bgSubtle:#2A1818;
  --stroke:#3D1F1F;--strokeSub:#291515;
  --text:#F8E8E8;--text2:#A8898C;--text3:#7A6062;--onAccent:#FFFFFF;
  --accent:#E63946;--accent2:#FF1744;--accent3:#8B0000;
  --previewC1:#130808;--previewC2:#E63946;--previewC3:#FF1744;
}
[data-theme="zerolag"]{
  --bgWindow:#050505;--bgSidebar:#0C0C0C;--bgCard:#131313;--bgCardHover:#1C1C1C;--bgSubtle:#222222;
  --stroke:#2A2A2A;--strokeSub:#1A1A1A;
  --text:#F2F2F2;--text2:#9E9E9E;--text3:#606060;--onAccent:#050505;
  --accent:#EAF6FF;--accent2:#FFFFFF;--accent3:#B0BBC4;
  --previewC1:#0C0C0C;--previewC2:#606060;--previewC3:#FFFFFF;
}
[data-theme="apex"]{
  --bgWindow:#0A0907;--bgSidebar:#13110D;--bgCard:#1A1612;--bgCardHover:#251F18;--bgSubtle:#2D261E;
  --stroke:#3C342B;--strokeSub:#26211A;
  --text:#FAF6EE;--text2:#C5B9A0;--text3:#7A6F58;--onAccent:#1A1612;
  --accent:#D4AF37;--accent2:#FFD700;--accent3:#8B7500;
  --previewC1:#13110D;--previewC2:#D4AF37;--previewC3:#FFD700;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,sans-serif;background:#000;color:#fff;font-size:14px}
body{padding:14px 12px 60px}
h1{font-size:18px;margin:0 0 4px;color:#fff;font-weight:600}
.sub{color:#888;font-size:12px;margin:0 0 14px}
.toolbar{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 10px;padding:8px;background:#111;border-radius:10px;border:1px solid #222}
.toolbar .label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px;width:100%;margin-bottom:2px}
.chip{padding:7px 12px;border-radius:8px;background:#1c1c1c;border:1px solid #2a2a2a;color:#ddd;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;font-weight:500}
.chip:hover{background:#2a2a2a}
.chip.on{background:#fff;color:#000;border-color:#fff}
.chip .swatch{display:inline-flex;width:22px;height:10px;border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.2)}
.chip .swatch span{flex:1}

.app{margin-top:10px;border-radius:14px;overflow:hidden;background:var(--bgWindow);color:var(--text);border:1px solid var(--stroke)}
.app .titlebar{padding:10px 14px;background:var(--bgSidebar);border-bottom:1px solid var(--stroke);font-size:12px;color:var(--text2);display:flex;justify-content:space-between;align-items:center}
.app .titlebar .left{font-weight:600;color:var(--text)}
.app .titlebar .dots{display:flex;gap:6px}
.app .titlebar .dots i{width:10px;height:10px;border-radius:50%;background:var(--text3);opacity:.5}
.layout{display:grid;grid-template-columns:1fr;min-height:560px}
@media(min-width:720px){.layout{grid-template-columns:200px 1fr}}

.sidebar{background:var(--bgSidebar);padding:14px 10px;border-bottom:1px solid var(--stroke)}
@media(min-width:720px){.sidebar{border-bottom:0;border-right:1px solid var(--stroke)}}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px;border-bottom:1px solid var(--strokeSub);margin-bottom:12px}
.brand .logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:var(--onAccent);font-weight:800;font-size:14px;letter-spacing:.5px}
.brand .name{font-weight:700;font-size:14px;color:var(--text);letter-spacing:.5px}
.brand .tag{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.section-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:6px 8px 4px;font-weight:700}
.nav{display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;color:var(--text2);text-decoration:none;font-size:12.5px;cursor:pointer;transition:.15s}
.nav a:hover{background:var(--bgCardHover);color:var(--text)}
.nav a.active{background:var(--accent);color:var(--onAccent);font-weight:600}
.nav a .ic{width:14px;display:inline-block;text-align:center;font-size:13px}

.content{padding:18px 16px;overflow:hidden}
.title{font-size:20px;font-weight:700;color:var(--text);margin:0 0 4px}
.subtitle{font-size:12px;color:var(--text2);margin:0 0 16px;line-height:1.5}
.card{background:var(--bgCard);border:1px solid var(--stroke);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card h3{font-size:13px;margin:0 0 6px;color:var(--text)}
.card p{font-size:12px;color:var(--text2);margin:0;line-height:1.5}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:1px solid var(--stroke);background:var(--bgCardHover);color:var(--text);font-size:12px;font-weight:500;cursor:pointer}
.btn.primary{background:var(--accent);color:var(--onAccent);border-color:var(--accent);font-weight:600}
.btn.secondary{background:transparent;color:var(--text)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.spacer{height:8px}

.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.badge.free{background:var(--bgSubtle);color:var(--text2)}
.badge.adv{background:var(--cautionBg,#33FFB800);color:var(--caution,#FFB800);border:1px solid var(--caution,#FFB800)}
.badge.pro{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--onAccent)}
.badge.extra{background:linear-gradient(135deg,var(--accent2),var(--accentExtra,var(--accent3)));color:var(--onAccent)}
.badge.safe{background:var(--successBg,#3300D9A0);color:var(--success,#00D9A0)}
.badge.risk{background:var(--criticalBg,#33FF5470);color:var(--critical,#FF5470)}
.badge.impact-soft{background:rgba(255,255,255,.06);color:var(--text2)}
.badge.impact-strong{background:var(--cautionBg,#33FFB800);color:var(--caution,#FFB800)}
.badge.impact-extreme{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--onAccent);font-weight:700}

.module{background:var(--bgCard);border:1px solid var(--stroke);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.module .head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.module .nm{font-size:12px;font-weight:600;color:var(--text);flex:1;min-width:0}
.module .help{width:18px;height:18px;border-radius:50%;background:var(--bgSubtle);color:var(--text2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.module .desc{font-size:11px;color:var(--text2);line-height:1.4;margin:2px 0}
.module.locked{opacity:.55}
.module.locked::after{content:"🔒";float:right;margin-top:-22px}

.tab{display:flex;border-bottom:1px solid var(--stroke);margin-bottom:10px}
.tab span{padding:8px 14px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.tab span.on{color:var(--accent);border-color:var(--accent)}

.kv{display:grid;grid-template-columns:120px 1fr;gap:6px 12px;font-size:12px;margin-top:6px}
.kv .k{color:var(--text2)}
.kv .v{color:var(--text)}

.score-ring{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:conic-gradient(var(--accent) 0% 78%, var(--bgSubtle) 78% 100%);position:relative;margin:0 auto}
.score-ring::before{content:"";position:absolute;inset:8px;border-radius:50%;background:var(--bgCard)}
.score-ring .v{font-size:28px;font-weight:800;color:var(--text);z-index:1}
.score-ring .l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;z-index:1}

.cat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bgCard);border:1px solid var(--stroke);border-radius:6px;margin-bottom:4px;font-size:12px}
.cat-row .nm{font-weight:600;color:var(--text);width:90px}
.cat-row .det{color:var(--text2);flex:1;text-align:center}
.cat-row .sc{font-weight:700;color:var(--text)}

.theme-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.theme-tile{width:140px;height:100px;border-radius:8px;border:2px solid var(--stroke);overflow:hidden;cursor:pointer;background:var(--bgCard);position:relative;display:flex;flex-direction:column}
.theme-tile.active{border-color:var(--accent)}
.theme-tile.locked{opacity:.55}
.theme-tile .swatch3{flex:1;display:flex}
.theme-tile .swatch3 i{flex:1}
.theme-tile .lbl{padding:5px 8px;background:var(--bgCard);border-top:1px solid var(--stroke)}
.theme-tile .lbl .n{font-size:11px;font-weight:700;color:var(--text);letter-spacing:.4px}
.theme-tile .lbl .h{font-size:9px;color:var(--text3);margin-top:1px}
.theme-tile .active-pill{position:absolute;top:6px;right:6px;background:var(--accent);color:var(--onAccent);font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.theme-tile .lock-ovl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;text-shadow:0 1px 4px #000}

.toggle{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--strokeSub)}
.toggle:last-child{border-bottom:0}
.toggle .lbl{font-size:12px;color:var(--text);font-weight:500}
.toggle .desc{font-size:11px;color:var(--text2)}
.toggle .sw{width:36px;height:20px;background:var(--bgSubtle);border-radius:10px;position:relative;cursor:pointer}
.toggle .sw.on{background:var(--accent)}
.toggle .sw::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.15s}
.toggle .sw.on::after{left:19px}

.combo{padding:8px 12px;background:var(--bgCard);border:1px solid var(--stroke);border-radius:6px;color:var(--text);font-size:12px;min-width:180px;display:inline-flex;justify-content:space-between;align-items:center}
.combo .arr{color:var(--text3);font-size:9px}

.log-row{display:grid;grid-template-columns:80px 70px 90px 1fr;gap:10px;padding:6px 10px;background:var(--bgCard);border:1px solid var(--stroke);border-radius:6px;font-size:11px;margin-bottom:4px}
.log-row .t{color:var(--text3);font-family:Consolas,monospace}
.log-row .lvl{font-weight:700;text-transform:uppercase;font-size:9px;letter-spacing:.5px}
.log-row .cat{color:var(--text2)}
.log-row .msg{color:var(--text)}
.log-row .lvl.info{color:var(--text2)}
.log-row .lvl.success{color:var(--success)}
.log-row .lvl.warn{color:var(--caution)}
.log-row .lvl.error{color:var(--critical)}

.specs{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:480px){.specs{grid-template-columns:1fr 1fr}}
.spec-card{background:var(--bgCard);border:1px solid var(--stroke);border-radius:8px;padding:10px 12px}
.spec-card .ic{font-size:18px;margin-bottom:4px}
.spec-card .lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.spec-card .v{font-size:13px;color:var(--text);font-weight:600;margin-top:2px}
.spec-card .d{font-size:11px;color:var(--text3);margin-top:2px}

.stack-wrap{display:flex;flex-wrap:wrap;gap:6px}
.stack-pill{padding:4px 10px;background:var(--bgSubtle);border-radius:5px;font-size:10px;color:var(--text2)}

.update-banner{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--onAccent);padding:14px 16px;border-radius:10px;margin-bottom:12px}
.update-banner .t{font-weight:700;font-size:14px;margin-bottom:2px}
.update-banner .d{font-size:12px;opacity:.9}

.gradient-text{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.hero{background:var(--bgCard);border:1px solid var(--stroke);border-radius:10px;padding:20px;text-align:center;margin-bottom:12px}
.hero .big{font-size:24px;font-weight:800;letter-spacing:.5px;color:var(--text);margin-bottom:4px}
.hero .small{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:2px}
.hero .v{display:inline-block;padding:3px 10px;background:var(--accent);color:var(--onAccent);border-radius:4px;font-size:10px;font-weight:700;margin-top:8px;letter-spacing:1px}

.hint{font-size:11px;color:var(--text3);padding:8px 12px;background:var(--bgSubtle);border-radius:6px;margin-bottom:8px;border-left:3px solid var(--accent)}

.section-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px}
</style>
</head>
<body>

<h1>DexSuite — Preview</h1>
<p class="sub">Maqueta visual. Toca un tema y una vista para previsualizar.</p>

<div class="toolbar">
  <span class="label">Tema</span>
  <button class="chip on" data-set-theme="default"><span class="swatch"><span style="background:#1B1B1B"></span><span style="background:#60CDFF"></span><span style="background:#FFF"></span></span>DEFAULT</button>
  <button class="chip" data-set-theme="cybernetic"><span class="swatch"><span style="background:#0F0F1F"></span><span style="background:#00B8D9"></span><span style="background:#9D4EDD"></span></span>CYBERNETIC</button>
  <button class="chip" data-set-theme="redline"><span class="swatch"><span style="background:#130808"></span><span style="background:#E63946"></span><span style="background:#FF1744"></span></span>REDLINE</button>
  <button class="chip" data-set-theme="zerolag"><span class="swatch"><span style="background:#0C0C0C"></span><span style="background:#606060"></span><span style="background:#FFFFFF"></span></span>ZERO LAG</button>
  <button class="chip" data-set-theme="apex"><span class="swatch"><span style="background:#13110D"></span><span style="background:#D4AF37"></span><span style="background:#FFD700"></span></span>APEX</button>

<div class="toolbar">
  <span class="label">Vista</span>
  <button class="chip on" data-set-view="home">Inicio</button>

  <button class="chip" data-set-view="modules">Módulos</button>
  <button class="chip" data-set-view="modulesRun">Módulos · ejecutando</button>
  <button class="chip" data-set-view="modulesSearch">Módulos · búsqueda</button>

  <button class="chip" data-set-view="settings">Ajustes</button>
  <button class="chip" data-set-view="updates">Actualizaciones</button>

  <button class="chip" data-set-view="specs">Especificaciones</button>
  <button class="chip" data-set-view="about">Acerca de</button>
</div>

<div class="app" id="app" data-theme="default">
  <div class="titlebar">
    <div class="left">DexSuite — Performance Series</div>
    <div class="dots"><i></i><i></i><i></i></div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="brand">
        <div class="logo">DX</div>
        <div>
          <div class="name">DEXSUITE</div>
          <div class="tag">AL LÍMITE</div>
        </div>
      </div>
      <div class="section-label">PANEL</div>
      <nav class="nav" id="nav">
        <a data-view="home" class="active"><span class="ic">🏠</span>Inicio</a>
        <a data-view="modules"><span class="ic">📦</span>Módulos</a>
        <a data-view="log"><span class="ic">📋</span>Registro</a>
      </nav>
      <div class="section-label" style="margin-top:14px">SISTEMA</div>
      <nav class="nav">
        <a data-view="specs"><span class="ic">⚙️</span>Especificaciones</a>
        <a data-view="settings"><span class="ic">🎛️</span>Ajustes</a>
        <a data-view="updates"><span class="ic">⬇️</span>Actualizaciones</a>
        <a data-view="about"><span class="ic">ℹ️</span>Acerca de</a>
      </nav>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const VIEWS = {
home: `
<div class="hero">
  <div class="small">DEXSUITE</div>
  <div class="big gradient-text">AL LÍMITE</div>
  <div class="v">v0.1.0</div>

  <div style="flex:1;min-width:200px">
    <div class="cat-row"><span class="nm">CPU</span><span class="det">24% en uso</span><span class="sc">82/100</span></div>
    <div class="cat-row"><span class="nm">Memoria</span><span class="det">12 GB / 32 GB</span><span class="sc">75/100</span></div>

</div>

  <button class="btn secondary">↻ Reiniciar puntuaciones</button>

`,

modules: `
<div class="title">Módulos disponibles</div>
<p class="subtitle">Marca los módulos que quieras ejecutar.<br>Pasa el ratón por el chip Seguro/Riesgo para saber por qué.</p>
<div class="row" style="justify-content:space-between;margin-bottom:12px">

  </div>
</div>
<div class="row" style="align-items:flex-start;gap:10px;flex-wrap:wrap">
  <div style="flex:1;min-width:200px">
    <div class="row" style="margin-bottom:8px"><span class="badge free">FREE</span><span style="color:var(--text2);font-size:11px">3 módulos</span></div>

const app = document.getElementById('app');
const content = document.getElementById('content');
const themeBtns = document.querySelectorAll('[data-set-theme]');
const viewBtns = document.querySelectorAll('[data-set-view]');
const navLinks = document.querySelectorAll('[data-view]');

function render(viewKey){
  content.innerHTML = VIEWS[viewKey] || VIEWS.home;
  navLinks.forEach(n=>n.classList.toggle('active', n.dataset.view===viewKey));
  // Marca el tema activo en el selector de Ajustes según el tema actual del app.
  const cur = app.getAttribute('data-theme');
  document.querySelectorAll('.theme-tile').forEach(t=>{
    t.classList.toggle('active', t.dataset.tt===cur);
  });
}

function setTheme(th){
  app.setAttribute('data-theme', th);
  themeBtns.forEach(b=>b.classList.toggle('on', b.dataset.setTheme===th));
  // Re-render para que el selector de temas refresque el "Active"
  const cur = document.querySelector('[data-set-view].on')?.dataset.setView || 'home';
  render(cur);
}

function setView(v){
  viewBtns.forEach(b=>b.classList.toggle('on', b.dataset.setView===v));
  render(v);
}

themeBtns.forEach(b=>b.addEventListener('click', ()=>setTheme(b.dataset.setTheme)));
viewBtns.forEach(b=>b.addEventListener('click', ()=>setView(b.dataset.setView)));
navLinks.forEach(n=>n.addEventListener('click', ()=>setView(n.dataset.view)));

render('home');
</script>
</body>
